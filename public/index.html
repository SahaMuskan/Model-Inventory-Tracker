<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Inventory &amp; Risk Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">MR</div>
        <div class="brand-text">
          <strong>Model Inventory</strong>
          <span>&amp; Risk Tracker</span>
        </div>
      </div>
      <nav class="nav" id="nav">
        <a href="#/dashboard"   data-route="/dashboard">   <span class="ico">▦</span> Dashboard</a>
        <a href="#/models"      data-route="/models">      <span class="ico">▤</span> Model Register</a>
        <a href="#/validation"  data-route="/validation">  <span class="ico">◷</span> Validation Schedule</a>
        <a href="#/findings"    data-route="/findings">    <span class="ico">⚑</span> Findings &amp; Issues</a>
        <a href="#/methodology" data-route="/methodology"> <span class="ico">ℹ</span> Methodology</a>
        <a href="#/settings"    data-route="/settings">    <span class="ico">⚙</span> Settings</a>
      </nav>
      <div class="sidebar-foot">
        <div class="today" id="today-label"></div>
        <div class="muted">Data saved locally on this machine.</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">Dashboard</h1>
          <p id="page-subtitle" class="muted"></p>
        </div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>
      <div id="app" class="content"><div class="loading">Loading…</div></div>
    </main>
  </div>

  <div id="toast-root"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
